services:
  tei:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.9
    container_name: knowledge-tei
    command:
      - --model-id
      - google/embeddinggemma-300m
    ports:
      - "8080:80"
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
    volumes:
      - hf_cache:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:80/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  hf_cache:
