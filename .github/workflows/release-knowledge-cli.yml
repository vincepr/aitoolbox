name: release-knowledge-cli

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive_ext: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build knowledge-cli
        run: cargo build --release --locked -p knowledge-cli --target ${{ matrix.target }}

      - name: Package artifacts
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          out="knowledge-cli-${tag}-${{ matrix.target }}"
          mkdir -p "$out"
          cp "target/${{ matrix.target }}/release/knowledge-cli" "$out/"
          tar -czf "${out}.tar.gz" "$out"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: knowledge-cli-${{ matrix.target }}
          path: knowledge-cli-${{ github.ref_name }}-${{ matrix.target }}.tar.gz

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*.tar.gz
          generate_release_notes: true
